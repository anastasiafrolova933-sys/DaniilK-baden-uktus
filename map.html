<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Баден-Баден — Схема комплекса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff;
  --surface:#f5f5f7;
  --text:#1d1d1f;
  --text-2:#6e6e73;
  --accent:#3d6b5a;
  --accent-bg:rgba(61,107,90,0.10);
  --border-light:#e8e8ed;
  --border:#d2d2d7;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--surface);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;overflow:hidden;}

.filter-bar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border-light);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.filter-bar::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:980px;border:1.5px solid var(--border-light);background:var(--white);cursor:pointer;font-size:12px;font-weight:500;color:var(--text-2);font-family:'Inter',sans-serif;transition:all .18s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.cat-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-pill.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.cat-pill:not(.active){opacity:.45;}

.map-container{flex:1;position:relative;overflow:hidden;background:var(--surface);}
.map-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.map-img-box{position:relative;display:inline-block;line-height:0;}
.map-img-box img{max-width:100%;max-height:calc(100vh - 50px);object-fit:contain;display:block;user-select:none;-webkit-user-drag:none;}

.mk{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .15s;}
.mk:hover{transform:translate(-50%,-50%) scale(1.45);z-index:50;}
.mk.active{transform:translate(-50%,-50%) scale(1.6);z-index:60;}
.mk-c{width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:#fff;font-size:8.5px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.38);font-family:'Inter',sans-serif;}
@keyframes pulse-out{0%{transform:translate(-50%,-50%) scale(1);opacity:.65;}100%{transform:translate(-50%,-50%) scale(2.8);opacity:0;}}
.mk-ring{position:absolute;width:22px;height:22px;border-radius:50%;left:50%;top:50%;border:2px solid currentColor;pointer-events:none;}
.mk.pulsing .mk-ring{animation:pulse-out .7s ease-out 3;}
.mk.edit-mode{cursor:grab!important;}

.tt{position:fixed;z-index:200;background:var(--text);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.2);display:none;transform:translate(-50%,-130%);}
.tt::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom:none;border-top-color:var(--text);}

.info-card{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:20px 20px 0 0;box-shadow:0 -2px 32px rgba(0,0,0,.11);padding:18px 20px 32px;display:flex;align-items:center;gap:14px;transform:translateY(110%);transition:transform .32s cubic-bezier(.34,1.4,.64,1);z-index:100;}
.info-card.on{transform:translateY(0);}
.info-handle{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:var(--border-light);}
.ib-num{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;font-family:'Inter',sans-serif;}
.ib-body{flex:1;min-width:0;}
.ib-name{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;}
.ib-cat{font-size:12px;color:var(--text-2);margin-top:3px;}
.ib-close{width:30px;height:30px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:14px;border:none;flex-shrink:0;transition:background .15s;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
.ib-close:hover{background:var(--border-light);}

.toolbar{position:absolute;top:12px;right:12px;z-index:100;display:none;gap:6px;flex-direction:column;align-items:flex-end;}
.tb-btn{background:rgba(255,255,255,.92);color:var(--text-2);border:1px solid var(--border-light);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;backdrop-filter:blur(12px);transition:all .15s;white-space:nowrap;}
.tb-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
#export-box{display:none;background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:10px;max-width:280px;}
#export-box textarea{width:100%;height:80px;background:var(--surface);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:10px;font-family:monospace;resize:none;padding:6px;outline:none;}
</style>
</head>

<div class="filter-bar" id="filter-bar"></div>

<div class="map-container" id="map-container">
  <div class="map-wrap">
    <div class="map-img-box" id="map-img-box">

    </div>
  </div>
  <div class="toolbar" id="toolbar">
    <button class="tb-btn" id="edit-btn">Редактирование</button>
    <div id="export-box">

      <button class="tb-btn" id="copy-btn" style="width:100%;margin-top:6px;">Скопировать</button>
    </div>
  </div>
  <div class="tt" id="tt"></div>
</div>

<div class="info-card" id="info-card">
  <div class="info-handle"></div>
  <div class="ib-num" id="ib-num"></div>
  <div class="ib-body">

function buildFilterPills() {
  filterBar.innerHTML = '';
  for (var key in CATS) {
    var cat = CATS[key];
    var pill = document.createElement('button');
    pill.className = 'cat-pill active';
    pill.dataset.cat = key;
    pill.innerHTML = '<span class="dot" style="background:' + cat.color + '"></span>' + cat.icon + ' ' + cat.name;
    pill.addEventListener('click', (function(k){ return function(){ toggleCat(k); }; })(key));
    filterBar.appendChild(pill);
  }
}

function toggleCat(key) {
  if (hiddenCats.has(key)) hiddenCats.delete(key); else hiddenCats.add(key);
  var on = !hiddenCats.has(key);
  document.querySelectorAll('.cat-pill[data-cat="' + key + '"]').forEach(function(p){ p.classList.toggle('active', on); });
  document.querySelectorAll('.mk').forEach(function(mk){
    var obj = OBJ.find(function(o){ return o.id === mk.dataset.id; });
    if (obj) mk.style.display = hiddenCats.has(obj.cat) ? 'none' : '';
  });
  if (activeId) {
    var aobj = OBJ.find(function(o){ return o.id === activeId; });
    if (aobj && hiddenCats.has(aobj.cat)) closeInfo();
  }
}

function buildMarkers() {
  document.querySelectorAll('.mk').forEach(function(m){ m.remove(); });
  OBJ.forEach(function(obj) {
    var cat = CATS[obj.cat];
    var el = document.createElement('div');
    el.className = 'mk';
    el.dataset.id = obj.id;
    el.style.left  = obj.x + '%';
    el.style.top   = obj.y + '%';
    el.style.color = cat.color;
    el.innerHTML = '<div class="mk-ring"></div><div class="mk-c" style="background:' + cat.color + '">' + obj.n + '</div>';
    el.addEventListener('mouseenter', (function(o){ return function(e){ if (!editMode) showTT(e, o); }; })(obj));
    el.addEventListener('mouseleave', hideTT);
    el.addEventListener('mousemove',  function(e){ if (!editMode) moveTT(e); });
    el.addEventListener('mousedown',  (function(o, elem){ return function(e){ startDrag(e, elem, o); }; })(obj, el));
    el.addEventListener('touchend',   (function(o){ return function(e){ e.preventDefault(); e.stopPropagation(); selectObj(o.id); }; })(obj), { passive: false });
    mapImgBox.appendChild(el);
  });
}

function showTT(e, obj) { tt.textContent = obj.n + '. ' + obj.name; tt.style.display = 'block'; moveTT(e); }
function moveTT(e) { tt.style.left = e.clientX + 'px'; tt.style.top = (e.clientY - 8) + 'px'; }
function hideTT() { tt.style.display = 'none'; }

function selectObj(id) {
  if (editMode) return;
  if (activeId === id) { closeInfo(); return; }
  var prev = document.querySelector('.mk[data-id="' + activeId + '"]');
  if (prev) prev.classList.remove('active');
  activeId = id;
  var obj = OBJ.find(function(o){ return o.id === id; });
  var cat = CATS[obj.cat];
  var mk = document.querySelector('.mk[data-id="' + id + '"]');
  if (mk) { mk.classList.add('active','pulsing'); setTimeout(function(){ mk.classList.remove('pulsing'); }, 2100); }
  $('ib-num').textContent      = obj.n;
  $('ib-num').style.background = cat.color;
  $('ib-name').textContent     = obj.name;
  $('ib-cat').textContent      = cat.icon + ' ' + cat.name;
  infoCard.classList.add('on');
}

function closeInfo() {
  var mk = document.querySelector('.mk[data-id="' + activeId + '"]');
  if (mk) mk.classList.remove('active');
  activeId = null;
  infoCard.classList.remove('on');
}

$('ib-close').addEventListener('click', closeInfo);
$('map-container').addEventListener('click', function(e) {
  if (!e.target.closest('.mk') && !e.target.closest('.toolbar')) closeInfo();
});
$('map-container').addEventListener('touchend', function(e) {
  if (!e.target.closest('.mk')) closeInfo();
}, { passive: true });

function startDrag(e, el, obj) {
  if (!editMode) {
    var sx = e.clientX, sy = e.clientY;
    var onUp = function(up) {
      if (Math.abs(up.clientX - sx) < 5 && Math.abs(up.clientY - sy) < 5) selectObj(obj.id);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mouseup', onUp);
    return;
  }
  e.preventDefault(); hideTT();
  dragging = el; dragObj = obj;
  el.style.transition = 'none'; el.style.zIndex = '200';
}
document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var rect = mapImgBox.getBoundingClientRect();
  var x = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width  * 100));
  var y = Math.max(0, Math.min(100, (e.clientY - rect.top)  / rect.height * 100));
  dragging.style.left = x.toFixed(1) + '%';
  dragging.style.top  = y.toFixed(1) + '%';
  tt.textContent = '[' + x.toFixed(1) + '%, ' + y.toFixed(1) + '%]';
  tt.style.display = 'block'; tt.style.left = e.clientX + 'px'; tt.style.top = (e.clientY - 8) + 'px';
});
document.addEventListener('mouseup', function(e) {
  if (!dragging) return;
  var rect = mapImgBox.getBoundingClientRect();
  dragObj.x = parseFloat(((e.clientX - rect.left) / rect.width  * 100).toFixed(1));
  dragObj.y = parseFloat(((e.clientY - rect.top)  / rect.height * 100).toFixed(1));
  dragging.style.transition = ''; dragging.style.zIndex = '';
  dragging = null; dragObj = null; hideTT(); updateExport();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'e' && e.ctrlKey) { e.preventDefault(); toggleEdit(); }
  if (e.key === 'Escape') { if (editMode) toggleEdit(); else closeInfo(); }
});

function toggleEdit() {
  editMode = !editMode;
  var toolbar = $('toolbar');
  toolbar.style.display = editMode ? 'flex' : 'none';
  $('edit-btn').classList.toggle('active', editMode);
  $('edit-btn').textContent = editMode ? 'Выйти' : 'Редактирование';
  $('export-box').style.display = editMode ? 'block' : 'none';
  document.querySelectorAll('.mk').forEach(function(mk){ mk.classList.toggle('edit-mode', editMode); });
  if (editMode) { updateExport(); closeInfo(); }
}
$('edit-btn').addEventListener('click', toggleEdit);

function updateExport() {
  $('export-ta').value = OBJ.map(function(o){
    return "  { id:'" + o.id + "', n:" + o.n + ", name:'" + o.name + "', cat:'" + o.cat + "', x:" + o.x + ", y:" + o.y + " },";
  }).join('\n');
}
$('copy-btn').addEventListener('click', function() {
  $('export-ta').select(); document.execCommand('copy');
  $('copy-btn').textContent = 'Скопировано!';
  setTimeout(function(){ $('copy-btn').textContent = 'Скопировать'; }, 1500);
});
</script>
</body>
</html>
