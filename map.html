<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Баден-Баден — Схема комплекса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff;
  --surface:#f5f5f7;
  --text:#1d1d1f;
  --text-2:#6e6e73;
  --accent:#3d6b5a;
  --accent-bg:rgba(61,107,90,0.10);
  --border-light:#e8e8ed;
  --border:#d2d2d7;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--surface);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;}

/* ── FILTER PILLS ── */
.filter-bar{
  padding:10px 16px;
  background:var(--white);
  border-bottom:1px solid var(--border-light);
  display:flex;gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.filter-bar::-webkit-scrollbar{display:none;}
.cat-pill{
  flex-shrink:0;
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  border-radius:980px;
  border:1.5px solid var(--border-light);
  background:var(--white);
  cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text-2);
  font-family:'Inter',sans-serif;
  transition:all .18s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.cat-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-pill.active{
  background:var(--accent-bg);
  border-color:var(--accent);
  color:var(--accent);
}
.cat-pill:not(.active){
  opacity:.45;
  text-decoration:line-through;
  text-decoration-color:var(--border);
}

/* ── MAP AREA ── */
.map-container{
  flex:1;
  position:relative;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);
  touch-action:none;
}
.map-wrap{position:relative;display:none;}
.map-wrap img{display:block;width:100%;height:100%;user-select:none;-webkit-user-drag:none;}

/* ── MARKERS ── */
.mk{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .15s;}
.mk:hover{transform:translate(-50%,-50%) scale(1.45);z-index:50;}
.mk.active{transform:translate(-50%,-50%) scale(1.6);z-index:60;}
.mk-c{
  width:22px;height:22px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.92);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:8.5px;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.38);
  transition:box-shadow .15s;
  font-family:'Inter',sans-serif;
}
.mk:hover .mk-c{box-shadow:0 4px 16px rgba(0,0,0,.5);}
@keyframes pulse-out{0%{transform:translate(-50%,-50%) scale(1);opacity:.65;}100%{transform:translate(-50%,-50%) scale(2.8);opacity:0;}}
.mk-ring{position:absolute;width:22px;height:22px;border-radius:50%;left:50%;top:50%;border:2px solid currentColor;pointer-events:none;}
.mk.pulsing .mk-ring{animation:pulse-out .7s ease-out 3;}
.mk.edit-mode{cursor:grab!important;}
.mk.edit-mode:active{cursor:grabbing!important;}

/* ── TOOLTIP (desktop) ── */
.tt{
  position:fixed;z-index:200;
  background:var(--text);color:#fff;
  padding:6px 12px;border-radius:8px;
  font-size:12px;font-family:'Inter',sans-serif;font-weight:500;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
  display:none;transform:translate(-50%,-130%);
}
.tt::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom:none;border-top-color:var(--text);}

/* ── INFO BOTTOM CARD ── */
.info-card{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);
  border-radius:20px 20px 0 0;
  box-shadow:0 -2px 32px rgba(0,0,0,.11);
  padding:18px 20px 32px;
  display:flex;align-items:center;gap:14px;
  transform:translateY(110%);
  transition:transform .32s cubic-bezier(.34,1.4,.64,1);
  z-index:100;
}
.info-card.on{transform:translateY(0);}
.info-handle{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--border-light);
}
.ib-num{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  font-family:'Inter',sans-serif;
}
.ib-body{flex:1;min-width:0;}
.ib-name{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;}
.ib-cat{font-size:12px;color:var(--text-2);margin-top:3px;}
.ib-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-2);font-size:14px;font-weight:500;
  border:none;flex-shrink:0;transition:background .15s;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.ib-close:hover{background:var(--border-light);}

/* ── EDIT TOOLBAR (hidden, Ctrl+E to toggle) ── */
.toolbar{
  position:absolute;top:12px;right:12px;z-index:100;
  display:none;gap:6px;flex-direction:column;align-items:flex-end;
}
.tb-btn{
  background:rgba(255,255,255,.92);color:var(--text-2);
  border:1px solid var(--border-light);
  padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:11px;font-family:'Inter',sans-serif;
  backdrop-filter:blur(12px);
  transition:all .15s;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.tb-btn:hover{background:var(--white);color:var(--text);}
.tb-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
#export-box{display:none;background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:10px;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.1);}
#export-box textarea{width:100%;height:80px;background:var(--surface);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:10px;font-family:monospace;resize:none;padding:6px;outline:none;}
</style>
</head>
<body>

<!-- Category filter pills -->
<div class="filter-bar" id="filter-bar"></div>

<!-- Map -->
<div class="map-container" id="map-area">

  <div class="map-wrap" id="map-wrap">
    <img id="map-img" alt="Схема комплекса">
  </div>

  <!-- Edit toolbar: Ctrl+E to show -->
  <div class="toolbar" id="toolbar">
    <button class="tb-btn" id="edit-btn">✏️ Редактирование</button>
    <div id="export-box">
      <textarea id="export-ta" readonly></textarea>
      <button class="tb-btn" id="copy-btn" style="width:100%;margin-top:6px;">📋 Скопировать</button>
    </div>
  </div>

  <div class="tt" id="tt"></div>
</div>

<!-- Bottom info card -->
<div class="info-card" id="info-card">
  <div class="info-handle"></div>
  <div class="ib-num" id="ib-num"></div>
  <div class="ib-body">
    <div class="ib-name" id="ib-name"></div>
    <div class="ib-cat"  id="ib-cat"></div>
  </div>
  <button class="ib-close" id="ib-close">✕</button>
</div>

<script>
/* ═══════════════ ДАННЫЕ ═══════════════ */
const CATS = {

let OBJ = [
  // ─ Входы
  { id:'vhod',     n:1,  name:'Проход к БарнХаусам',    cat:'entry', x:46.7, y:30.2 },
  { id:'vhod_res', n:2,  name:'Вход резиденции',         cat:'entry', x:71.8, y:88.8 },
  { id:'vhod_cmp', n:3,  name:'Вход к комплексу',        cat:'entry', x: 7.9, y:47.9 },
  // ─ Термы и сервис
  { id:'kassy',    n:4,  name:'Кассы',                   cat:'termy', x:14.9, y:42.5 },
  { id:'muzh',     n:5,  name:'Мужская раздевалка',      cat:'termy', x:19.1, y:40.9 },
  { id:'zhen',     n:6,  name:'Женская раздевалка',      cat:'termy', x:18.7, y:45.7 },
  { id:'detk',     n:7,  name:'Детская комната',         cat:'termy', x:28.4, y:39.5 },
  { id:'vyhod',    n:8,  name:'Выход в бассейн',         cat:'termy', x:30.2, y:48.0 },
  { id:'zona',     n:9,  name:'Зона отдыха',             cat:'termy', x:25.7, y:58.2 },
  // ─ Бары и Кафе
  { id:'kafe',     n:10, name:'Кафе',                    cat:'bar',   x:20.8, y:53.0 },
  { id:'pool_bar', n:11, name:'Пул-Бар',                 cat:'bar',   x:18.8, y:64.1 },
  { id:'germ_b',   n:12, name:'Немецкий БАР',            cat:'bar',   x:29.3, y:66.4 },
  { id:'grill',    n:13, name:'Гриль-БАР',               cat:'bar',   x:82.5, y:52.8 },
  // ─ Бассейны
  { id:'main_p',   n:14, name:'Главный бассейн',         cat:'pool',  x:37.1, y:39.9 },
  { id:'mass_p',   n:15, name:'Массажные бассейны',      cat:'pool',  x:46.0, y:44.0 },
  { id:'det_p',    n:16, name:'Детский бассейн',         cat:'pool',  x:56.7, y:54.4 },
  { id:'plzh_p',   n:17, name:'Бассейны пляжа',          cat:'pool',  x:77.9, y:45.2 },
  // ─ SPA и Сауны
  { id:'spa',      n:18, name:'SPA',                     cat:'spa',   x:32.2, y:63.6 },
  { id:'sauny',    n:19, name:'Сауны',                   cat:'spa',   x:39.3, y:60.2 },
  // ─ БарнХаусы
  { id:'bh1',      n:20, name:'БарнХаус 1',              cat:'barn',  x:41.9, y:23.3 },
  { id:'bh2',      n:21, name:'БарнХаус 2',              cat:'barn',  x:36.4, y:24.5 },
  { id:'bh3',      n:22, name:'БарнХаус 3',              cat:'barn',  x:29.8, y:26.2 },
  { id:'bh4',      n:23, name:'БарнХаус 4',              cat:'barn',  x:22.8, y:24.6 },
  { id:'bh5',      n:24, name:'БарнХаус 5',              cat:'barn',  x:16.6, y:21.9 },
  { id:'bh6',      n:25, name:'БарнХаус 6',              cat:'barn',  x: 9.5, y:26.5 },
  { id:'bh7',      n:26, name:'БарнХаус 7',              cat:'barn',  x: 7.4, y:16.4 },
  { id:'bh8',      n:27, name:'БарнХаус 8',              cat:'barn',  x:16.2, y:11.2 },
  { id:'bh9',      n:28, name:'БарнХаус 9',              cat:'barn',  x:22.7, y:12.7 },
  { id:'bh10',     n:29, name:'БарнХаус 10',             cat:'barn',  x:29.4, y:13.9 },
  { id:'bh11',     n:30, name:'БарнХаус 11',             cat:'barn',  x:34.4, y: 9.5 },
  { id:'bh12',     n:31, name:'БарнХаус 12',             cat:'barn',  x:38.1, y:16.2 },
  // ─ Резиденция
  { id:'kotedj',   n:32, name:'Котедж',                  cat:'resid', x:51.1, y:31.7 },
  // ─ Домики ДК
  { id:'dk1',      n:33, name:'ДК 1',                    cat:'dk',    x:82.2, y:84.2 },
  { id:'dk2',      n:34, name:'ДК 2',                    cat:'dk',    x:87.3, y:81.4 },
  { id:'dk3',      n:35, name:'ДК 3',                    cat:'dk',    x:90.1, y:75.8 },
  { id:'dk4',      n:36, name:'ДК 4',                    cat:'dk',    x:92.6, y:70.1 },
  { id:'dk5',      n:37, name:'ДК 5',                    cat:'dk',    x:93.5, y:63.9 },
  { id:'dk6',      n:38, name:'ДК 6',                    cat:'dk',    x:93.8, y:58.6 },
  { id:'dk7',      n:39, name:'ДК 7',                    cat:'dk',    x:93.7, y:51.5 },
  { id:'dk8',      n:40, name:'ДК 8',                    cat:'dk',    x:93.2, y:45.6 },
  { id:'dk9',      n:41, name:'ДК 9',                    cat:'dk',    x:91.9, y:39.9 },
  { id:'dk10',     n:42, name:'ДК 10',                   cat:'dk',    x:86.2, y:42.1 },
  { id:'dk11',     n:43, name:'ДК 11',                   cat:'dk',    x:85.4, y:37.6 },
  { id:'dk12',     n:44, name:'ДК 12',                   cat:'dk',    x:80.1, y:34.2 },
  { id:'dk13',     n:45, name:'ДК 13',                   cat:'dk',    x:75.3, y:36.0 },
  { id:'dk14',     n:46, name:'ДК 14',                   cat:'dk',    x:69.7, y:38.1 },
  // ─ Активности
  { id:'akvap',    n:47, name:'Аквапарк',                cat:'act',   x:61.9, y:65.2 },
  { id:'plazh',    n:48, name:'Пляж',                    cat:'act',   x:72.1, y:52.6 },
  { id:'volley',   n:49, name:'Волейбольная площадка',   cat:'act',   x:76.2, y:67.9 },
];

/* ═══════════════ СОСТОЯНИЕ ═══════════════ */
let activeId   = null;
let hiddenCats = new Set();
let editMode   = false;
let dragging   = null;
let dragObj    = null;

const $ = id => document.getElementById(id);
const mapWrap  = $('map-wrap');
const mapImg   = $('map-img');
const tt       = $('tt');
const infoCard = $('info-card');
const filterBar = $('filter-bar');

/* ═══════════════ ЗАГРУЗКА ═══════════════ */
mapImg.onload = () => {
  mapWrap.style.display = 'block';
  fitMap();
  buildMarkers();
  buildFilterPills();
};
mapImg.onerror = () => {};
mapImg.src = 'map.jpg';

function fitMap() {
  const area = $('map-area');
  const aw = area.clientWidth, ah = area.clientHeight;
  const iw = mapImg.naturalWidth, ih = mapImg.naturalHeight;
  const scale = Math.min(aw / iw, ah / ih);
  mapWrap.style.width  = (iw * scale) + 'px';
  mapWrap.style.height = (ih * scale) + 'px';
}
window.addEventListener('resize', () => { if (mapImg.naturalWidth) fitMap(); });

/* ═══════════════ PILL-ФИЛЬТРЫ ═══════════════ */
function buildFilterPills() {
  filterBar.innerHTML = '';
  for (const [key, cat] of Object.entries(CATS)) {
    const pill = document.createElement('button');
    pill.className = 'cat-pill active';
    pill.dataset.cat = key;
    pill.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.icon} ${cat.name}`;
    pill.addEventListener('click', () => toggleCat(key));
    filterBar.appendChild(pill);
  }
}

function toggleCat(key) {
  if (hiddenCats.has(key)) hiddenCats.delete(key); else hiddenCats.add(key);
  const on = !hiddenCats.has(key);
  document.querySelectorAll(`.cat-pill[data-cat="${key}"]`).forEach(p => p.classList.toggle('active', on));
  document.querySelectorAll('.mk').forEach(mk => {
    const obj = OBJ.find(o => o.id === mk.dataset.id);
    if (obj) mk.style.display = hiddenCats.has(obj.cat) ? 'none' : '';
  });
  if (activeId) {
    const aobj = OBJ.find(o => o.id === activeId);
    if (aobj && hiddenCats.has(aobj.cat)) closeInfo();
  }
}

/* ═══════════════ МАРКЕРЫ ═══════════════ */
function buildMarkers() {
  document.querySelectorAll('.mk').forEach(m => m.remove());
  for (const obj of OBJ) {
    const cat = CATS[obj.cat];
    const el = document.createElement('div');
    el.className = 'mk';
    el.dataset.id = obj.id;
    el.style.left  = obj.x + '%';
    el.style.top   = obj.y + '%';
    el.style.color = cat.color;
    el.innerHTML = `<div class="mk-ring"></div><div class="mk-c" style="background:${cat.color}">${obj.n}</div>`;

    // Desktop: hover tooltip
    el.addEventListener('mouseenter', e => { if (!editMode) showTT(e, obj); });
    el.addEventListener('mouseleave', hideTT);
    el.addEventListener('mousemove',  e => { if (!editMode) moveTT(e); });

    // Mouse drag / click
    el.addEventListener('mousedown', e => startDrag(e, el, obj));

    // Touch tap
    el.addEventListener('touchend', e => {
      e.preventDefault();
      e.stopPropagation();
      selectObj(obj.id);
    }, { passive: false });

    mapWrap.appendChild(el);
  }
}

/* ═══════════════ ТУЛТИП ═══════════════ */
function showTT(e, obj) { tt.textContent = `${obj.n}. ${obj.name}`; tt.style.display = 'block'; moveTT(e); }
function moveTT(e) { tt.style.left = e.clientX + 'px'; tt.style.top = (e.clientY - 8) + 'px'; }
function hideTT() { tt.style.display = 'none'; }

/* ═══════════════ ВЫБОР ОБЪЕКТА ═══════════════ */
function selectObj(id) {
  if (editMode) return;
  if (activeId === id) { closeInfo(); return; }
  document.querySelector(`.mk[data-id="${activeId}"]`)?.classList.remove('active');
  activeId = id;
  const obj = OBJ.find(o => o.id === id);
  const cat = CATS[obj.cat];
  const mk = document.querySelector(`.mk[data-id="${id}"]`);
  if (mk) { mk.classList.add('active','pulsing'); setTimeout(() => mk.classList.remove('pulsing'), 2100); }
  $('ib-num').textContent       = obj.n;
  $('ib-num').style.background  = cat.color;
  $('ib-name').textContent      = obj.name;
  $('ib-cat').textContent       = cat.icon + ' ' + cat.name;
  infoCard.classList.add('on');
}

function closeInfo() {
  document.querySelector(`.mk[data-id="${activeId}"]`)?.classList.remove('active');
  activeId = null;
  infoCard.classList.remove('on');
}

$('ib-close').addEventListener('click', closeInfo);
$('map-area').addEventListener('click', e => {
  if (!e.target.closest('.mk') && !e.target.closest('.toolbar')) closeInfo();
});
$('map-area').addEventListener('touchend', e => {
  if (!e.target.closest('.mk')) closeInfo();
}, { passive: true });

/* ═══════════════ DRAG (редактирование) ═══════════════ */
function startDrag(e, el, obj) {
  if (!editMode) {
    const sx = e.clientX, sy = e.clientY;
    const onUp = up => {
      if (Math.abs(up.clientX - sx) < 5 && Math.abs(up.clientY - sy) < 5) selectObj(obj.id);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mouseup', onUp);
    return;
  }
  e.preventDefault(); hideTT();
  dragging = el; dragObj = obj;
  el.style.transition = 'none'; el.style.zIndex = '200';
}
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = mapWrap.getBoundingClientRect();
  const x = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width  * 100));
  const y = Math.max(0, Math.min(100, (e.clientY - rect.top)  / rect.height * 100));
  dragging.style.left = x.toFixed(1) + '%';
  dragging.style.top  = y.toFixed(1) + '%';
  tt.textContent = `[${x.toFixed(1)}%, ${y.toFixed(1)}%]`;
  tt.style.display = 'block'; tt.style.left = e.clientX + 'px'; tt.style.top = (e.clientY - 8) + 'px';
});
document.addEventListener('mouseup', e => {
  if (!dragging) return;
  const rect = mapWrap.getBoundingClientRect();
  dragObj.x = parseFloat(((e.clientX - rect.left) / rect.width  * 100).toFixed(1));
  dragObj.y = parseFloat(((e.clientY - rect.top)  / rect.height * 100).toFixed(1));
  dragging.style.transition = ''; dragging.style.zIndex = '';
  dragging = null; dragObj = null; hideTT(); updateExport();
});

/* ═══════════════ РЕЖИМ РЕДАКТИРОВАНИЯ (Ctrl+E) ═══════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'e' && e.ctrlKey) { e.preventDefault(); toggleEdit(); }
  if (e.key === 'Escape') { if (editMode) toggleEdit(); else closeInfo(); }
});

function toggleEdit() {
  editMode = !editMode;
  const toolbar = $('toolbar');
  toolbar.style.display = editMode ? 'flex' : 'none';
  $('edit-btn').classList.toggle('active', editMode);
  $('edit-btn').textContent = editMode ? '✅ Выйти из редактирования' : '✏️ Редактирование';
  $('export-box').style.display = editMode ? 'block' : 'none';
  document.querySelectorAll('.mk').forEach(mk => mk.classList.toggle('edit-mode', editMode));
  if (editMode) { updateExport(); closeInfo(); }
}

$('edit-btn').addEventListener('click', toggleEdit);

function updateExport() {
  $('export-ta').value = OBJ.map(o =>
    `  { id:'${o.id}', n:${o.n}, name:'${o.name}', cat:'${o.cat}', x:${o.x}, y:${o.y} },`
  ).join('\n');
}
$('copy-btn').addEventListener('click', () => {
  $('export-ta').select(); document.execCommand('copy');
  $('copy-btn').textContent = '✅ Скопировано!';
  setTimeout(() => $('copy-btn').textContent = '📋 Скопировать', 1500);
});
</script>
