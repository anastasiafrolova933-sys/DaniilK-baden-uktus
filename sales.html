<style>
:root{
  /* Baden Uktus — премиум-минимализм (тёплый чёрный + золото) */
  --gold:#c8a97e;--gold-dim:#8a7350;--green:#6db580;--green-dim:rgba(109,181,128,.14);
  --red:#d97373;--red-dim:rgba(217,115,115,.14);--blue:#7ba3c4;--blue-dim:rgba(123,163,196,.30);
  --bg:#0c0c0c;--bg2:#14110e;--card:#161412;--card-hover:#1d1916;--border:rgba(255,255,255,.08);
  --text:#f0ede8;--text-dim:rgba(240,237,232,.55);--shadow:0 2px 16px rgba(0,0,0,.5);
  --radius:8px;--font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --orange:#d9a063;--gray:#9ca3af;--purple:#a896c7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:0 0 32px;min-height:100vh}
/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:12px;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar .title{font-size:15px;font-weight:700;color:var(--gold);white-space:nowrap}
.topbar select.month-select{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer}
.topbar select.month-select:hover{border-color:var(--gold-dim)}
.topbar .cmp-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
.topbar .cmp-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.topbar .cmp-btn.active{background:var(--gold-dim);color:var(--bg);border-color:var(--gold)}
.topbar .updated{margin-left:auto;font-size:11px;color:var(--text-dim);white-space:nowrap}
/* ── Compare panel ── */
.cmp-panel{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;gap:14px;flex-wrap:wrap;align-items:flex-end}
.cmp-panel.open{display:flex}
.cmp-panel .cmp-grp{display:flex;flex-direction:column;gap:4px}
.cmp-panel .cmp-lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.cmp-panel select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;color:var(--text);cursor:pointer;min-width:140px}
.cmp-panel .yoy-btn{background:var(--bg2);border:1px solid var(--gold-dim);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;white-space:nowrap}
.cmp-panel .yoy-btn:hover{background:var(--gold-dim);color:var(--bg)}
.cmp-panel .dept-cb{display:flex;flex-wrap:wrap;gap:10px;padding:4px 0}
.cmp-panel .dept-cb label{font-size:12px;color:var(--text);cursor:pointer;user-select:none;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:3px 10px;transition:.15s}
.cmp-panel .dept-cb label:hover{border-color:var(--gold-dim)}
.cmp-panel .dept-cb input{margin-right:5px;vertical-align:-1px}
.cmp-panel .dept-cb label:has(input:checked){background:var(--gold-dim);color:var(--bg);border-color:var(--gold)}
.cmp-no-data{padding:30px;text-align:center;color:var(--text-dim);font-size:13px}
.cmp-result{display:none;margin:0 16px 16px}
.cmp-result.show{display:block}
.delta-pos{color:var(--green);font-weight:600}
.delta-neg{color:var(--red);font-weight:600}
.delta-zero{color:var(--text-dim)}
/* ── KPI cards ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:14px 16px 4px}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);transition:border-color .2s;cursor:default}
.kpi-card:hover{border-color:var(--gold-dim)}
.kpi-card.total-card{border-color:var(--gold-dim)}
.kpi-card .dept{font-size:11px;text-transform:uppercase;color:var(--gold-dim);font-weight:700;letter-spacing:.6px;margin-bottom:8px}
.kpi-card .fact-val{font-size:24px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-card.total-card .fact-val{font-size:28px}
.kpi-card .pct-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;margin-bottom:6px}
.kpi-card .pct-badge.ok{background:var(--green-dim);color:var(--green)}
.kpi-card .pct-badge.warn{background:rgba(245,158,11,.15);color:var(--orange)}
.kpi-card .pct-badge.bad{background:var(--red-dim);color:var(--red)}
.kpi-card .row2{font-size:11px;color:var(--text-dim);line-height:1.9}
.kpi-card .row2 span{color:var(--text);font-weight:600}
.kpi-card .progress{height:3px;background:var(--bg2);border-radius:2px;margin-top:8px;overflow:hidden}
.kpi-card .progress .fill{height:100%;border-radius:2px}
/* ── Section headers ── */
.section-title{font-size:14px;font-weight:700;color:var(--gold);margin:20px 16px 10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
/* ── Chart ── */
.chart-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;margin:0 16px 16px;position:relative}
.chart-wrap canvas{max-height:240px}
/* ── Tables ── */
.table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:0;margin:0 16px 16px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:right;padding:7px 10px;background:var(--bg2);border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--gold-dim);font-weight:700;white-space:nowrap;position:sticky;top:0}
th:first-child{text-align:left}
td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
td:first-child{text-align:left}
tr:hover{background:var(--card-hover)}
tr.total-row td{font-weight:700;background:var(--bg2);color:var(--gold)}
tr.today-row td{background:rgba(200,169,110,.08);font-weight:600}
tr.future-row td{color:var(--text-dim)}
.tag-plan{color:var(--blue)}
.tag-fact{color:var(--green)}
.tag-forecast{color:var(--purple)}
.pos{color:var(--green)}.neg{color:var(--red)}
/* ── History filter ── */
.hist-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:0 16px 10px;margin-top:4px}
.hist-bar select{font-size:13px;padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer}
.hist-bar .lbl{font-size:12px;color:var(--text-dim)}
/* ── Dept table cols ── */
th.t,td.t{border-left:2px solid #c8a96e33}
/* ── Spinner ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;font-size:14px;color:var(--text-dim);gap:10px}
/* ── scroll-x hint ── */
.scroll-hint{font-size:10px;color:var(--text-dim);text-align:right;padding:4px 16px 0;opacity:.7}
</style>
</head>

    document.documentElement.style.visibility="hidden";
    var p=prompt("\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043f\u0430\u0440\u043e\u043b\u044c:");
    if(!p){document.documentElement.style.visibility="";window.location.href="about:blank";return;}
    s(p).then(function(h){if(h===H){localStorage.setItem("bbt_ok",H);document.documentElement.style.visibility="";}else{alert("\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u043f\u0430\u0440\u043e\u043b\u044c");window.location.reload();}});
  }
  document.documentElement.style.visibility="hidden";
  if(window.BadenAuth){
    BadenAuth.requireAuth({permission:PERM,verify:false}).then(function(sess){
      if(sess) document.documentElement.style.visibility="";
    }).catch(function(){/* requireAuth already redirected */});
  } else {
    // js/api.js \u043d\u0435 \u0437\u0430\u0433\u0440\u0443\u0437\u0438\u043b\u0441\u044f (offline / CORS) \u2192 fallback \u043d\u0430 legacy baden2026
    legacy();
  }
})();</script>

<script>
// ═══════════════════════════════════════════════════════
//  DATA — injected by update_sales_dashboard.ps1
// ═══════════════════════════════════════════════════════
var SALES_SUMMARY = null;   // { genDate, monthNum, monthYear, lastRealUpdate, depts:{}, daily:[] } — текущий месяц с подразделениями
var SALES_HISTORY = null;   // [ { year,month,plan,fact,guests, depts:{}, deptGuests:{} }, ... ] — месячные итоги
var SALES_DAILY_HISTORY = null; // { "YYYY-MM": [ {date, plan, fact, guests, depts:{}, deptPlans:{}, deptGuests:{}} ] }

// Активный выбранный месяц для главных KPI/графика/таблицы. Формат "YYYY-MM".
var ACTIVE_MONTH = null;

// ═══════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════
var RU_MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                 'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var RU_MONTHS_G = ['января','февраля','марта','апреля','мая','июня',
                   'июля','августа','сентября','октября','ноября','декабря'];
var SHORT_DAYS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function fmt(n){ if(!n&&n!==0)return'—'; return Math.round(n).toLocaleString('ru-RU'); }
function fmtK(n){ if(!n&&n!==0)return'—'; var v=Math.round(n/1000); return v.toLocaleString('ru-RU')+'K'; }
function fmtM(n){ if(!n&&n!==0)return'—'; return (n/1000000).toFixed(2)+' M'; }
function pct(f,p){ if(!p)return 0; return Math.round(f/p*100); }
function pctStr(f,p){ var v=pct(f,p); return v+'%'; }
function cl(v,ok,warn){ return v>=ok?'ok':v>=warn?'warn':'bad'; }
function dayOfWeek(dateStr){ // "dd.mm.yyyy"
  var p=dateStr.split('.'); if(p.length<3)return'';
  var d=new Date(+p[2],+p[1]-1,+p[0]);
  return SHORT_DAYS[d.getDay()];
}
function todayStr(){
  var d=new Date(); var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0'); var yy=d.getFullYear();
  return dd+'.'+mm+'.'+yy;
}

var _dailyChart = null;

// ═══════════════════════════════════════════════════════
//  KPI CARDS
// ═══════════════════════════════════════════════════════
// ASCII keys used throughout (PS script is ASCII-safe)
var DEPT_ORDER = ['TOTAL','THERMAL','HOTEL','KAFE','ANIM','SPA','PROCH'];
var DEPT_LABEL = {
  'TOTAL':'ИТОГО','THERMAL':'Thermal','HOTEL':'Гостиница',
  'KAFE':'Кафе','ANIM':'Анимация','SPA':'SPA','PROCH':'Прочее'
};
var DEPT_EMOJI = {
  'TOTAL':'🏆','THERMAL':'🌊','HOTEL':'🏨','KAFE':'☕','ANIM':'🎭','SPA':'💆','PROCH':'📦'
};

// ───────────────────────────────────────────────────────
//  getMonthView(ym) — единый объект для любого месяца.
//  Источник: для текущего месяца — SALES_SUMMARY (полный, с прогнозом/ср.чеком),
//  для остальных — агрегация из SALES_DAILY_HISTORY + месячные итоги из SALES_HISTORY.
//  Возвращает: { ym, isCurrent, depts:{KEY:{plan,fact,pct,forecast,pctForecast,guests,avgCheck}}, daily:[...] }
// ───────────────────────────────────────────────────────
function activeMonthKey(){ return ACTIVE_MONTH || currentMonthKey(); }
function currentMonthKey(){
  if(SALES_SUMMARY && SALES_SUMMARY.monthNum && SALES_SUMMARY.monthYear){
    return SALES_SUMMARY.monthYear+'-'+String(SALES_SUMMARY.monthNum).padStart(2,'0');
  }
  return null;
}

function getMonthView(ym){
  var curK = currentMonthKey();
  if(ym === curK && SALES_SUMMARY){
    return {
      ym: ym, isCurrent: true,
      depts: SALES_SUMMARY.depts || {},
      daily: SALES_SUMMARY.daily || []
    };
  }
  // Прошлый/будущий — собираем из дневной истории
  var daily = (SALES_DAILY_HISTORY && SALES_DAILY_HISTORY[ym]) ? SALES_DAILY_HISTORY[ym] : [];
  // Месячные итоги (более надёжно, чем суммировать дни — могут отличаться)
  var p = ym.split('-'); var yr = +p[0], mm = +p[1];
  var mRec = (SALES_HISTORY||[]).find(function(r){return r.year===yr && r.month===mm});
  var depts = {};
  if(mRec){
    // ИТОГО
    var totGuests = mRec.guests || 0;
    var totAvg = totGuests>0 ? Math.round((mRec.fact||0)/totGuests) : 0;
    depts['TOTAL'] = {
      plan: mRec.plan||0, fact: mRec.fact||0,
      pct: pct(mRec.fact, mRec.plan), forecast: mRec.fact||0, pctForecast: pct(mRec.fact, mRec.plan),
      guests: totGuests, avgCheck: totAvg
    };
    // По подразделениям из mRec.depts; план по dept надо взять из daily (агрегировать)
    var deptPlanSums = {THERMAL:0,HOTEL:0,KAFE:0,ANIM:0,SPA:0,PROCH:0};
    daily.forEach(function(d){
      if(d.deptPlans){
        for(var k in deptPlanSums){ deptPlanSums[k] += (d.deptPlans[k]||0); }
      }
    });
    ['THERMAL','HOTEL','KAFE','ANIM','SPA','PROCH'].forEach(function(k){
      var f = (mRec.depts&&mRec.depts[k])||0;
      var pl = deptPlanSums[k];
      var g = (mRec.deptGuests&&mRec.deptGuests[k])||0;
      depts[k] = {
        plan: pl, fact: f, pct: pct(f, pl),
        forecast: f, pctForecast: pct(f, pl),
        guests: g,
        avgCheck: g>0?Math.round(f/g):0
      };
    });
  }
  return { ym: ym, isCurrent: false, depts: depts, daily: daily };
}

function renderKPI(){
  var view = getMonthView(activeMonthKey()); if(!view||!view.depts)return;
  var depts = view.depts;
  var html='';
  DEPT_ORDER.forEach(function(k){
    var d=depts[k]; if(!d)return;
    var isTotal=(k==='TOTAL');
    var p=d.pct||0;
    var pf=d.pctForecast||0;
    var factFmt=isTotal?fmtM(d.fact):fmtK(d.fact);
    var cls=cl(p,100,80);
    html+='<div class="kpi-card'+(isTotal?' total-card':'')+'">';
    html+='<div class="dept">'+DEPT_EMOJI[k]+' '+DEPT_LABEL[k]+'</div>';
    html+='<div class="fact-val '+( p>=100?'pos':p>=80?'':'neg')+'">'+factFmt+'</div>';
    html+='<div class="pct-badge '+cls+'">'+p+'% от плана</div>';
    html+='<div class="row2">';
    html+='<div>📋 План: <span>'+fmtK(d.plan)+'</span></div>';
    // Прогноз показываем только для текущего месяца (для прошлых = факту)
    if(view.isCurrent){
      html+='<div>🔮 Прогноз: <span class="'+cl(pf,100,85)+'">'+fmtK(d.forecast)+'</span> ('+pf+'%)</div>';
    }
    if(d.guests){
      var metric=(k==='KAFE')?'Чеков':'Гостей';
      html+='<div>👥 '+metric+': <span>'+fmt(d.guests)+'</span>';
      if(d.avgCheck){
        var chkLabel=(k==='KAFE')?'Ср.чек':'₽/чел';
        html+=' · '+chkLabel+': <span>'+fmt(d.avgCheck)+'</span>';
      }
      html+='</div>';
    }
    html+='</div>';
    html+='<div class="progress"><div class="fill" style="width:'+Math.min(p,100)+'%;background:'+(p>=100?'var(--green)':p>=80?'var(--orange)':'var(--red)')+'"></div></div>';
    html+='</div>';
  });
  document.getElementById('kpiRow').innerHTML=html;
}

// ═══════════════════════════════════════════════════════
//  DAILY CHART
// ═══════════════════════════════════════════════════════
function renderChart(){
  var view=getMonthView(activeMonthKey()); if(!view||!view.daily||!view.daily.length){
    var ctx0=document.getElementById('dailyChart').getContext('2d');
    if(_dailyChart){_dailyChart.destroy();_dailyChart=null;}
    ctx0.clearRect(0,0,ctx0.canvas.width,ctx0.canvas.height);
    return;
  }
  var days=view.daily;
  var labels=days.map(function(d){return d.date.slice(0,5)});
  var plans=days.map(function(d){return d.plan||0});
  var facts=days.map(function(d){return d.fact||0});
  // Cumulative % line
  var planTotal=(view.depts&&view.depts['TOTAL'])?view.depts['TOTAL'].plan:0;
  var cumFact=0; var cumPcts=[];
  facts.forEach(function(f){ cumFact+=f; cumPcts.push(planTotal>0?Math.round(cumFact/planTotal*100):0); });

  var ctx=document.getElementById('dailyChart').getContext('2d');
  if(_dailyChart){_dailyChart.destroy();}
  _dailyChart=new Chart(ctx,{
    data:{
      labels:labels,
      datasets:[
        {type:'bar',label:'План',data:plans,backgroundColor:'rgba(96,165,250,.35)',borderColor:'rgba(96,165,250,.7)',borderWidth:1,order:2},
        {type:'bar',label:'Факт',data:facts,backgroundColor:function(ctx){
          var v=facts[ctx.dataIndex]||0; var p=plans[ctx.dataIndex]||1;
          return v>=p?'rgba(74,222,128,.6)':v>0?'rgba(245,158,11,.6)':'rgba(156,163,175,.2)';
        },borderWidth:0,order:2},
        {type:'line',label:'Накоп. %',data:cumPcts,yAxisID:'y2',borderColor:'#c8a96e',borderWidth:2,pointRadius:0,tension:.3,order:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#8899aa',font:{size:11}}},
        tooltip:{callbacks:{
          label:function(ctx){
            if(ctx.dataset.label==='Накоп. %')return'Накоп. %: '+ctx.raw+'%';
            return ctx.dataset.label+': '+Math.round(ctx.raw).toLocaleString('ru-RU')+' ₽';
          }
        }}
      },
      scales:{
        x:{ticks:{color:'#8899aa',font:{size:10},maxTicksLimit:16},grid:{color:'#2a3a5c'}},
        y:{ticks:{color:'#8899aa',font:{size:10},callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{color:'#2a3a5c'}},
        y2:{position:'right',min:0,max:150,ticks:{color:'#c8a96e',font:{size:10},callback:function(v){return v+'%'}},grid:{display:false}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
//  DAILY TABLE
// ═══════════════════════════════════════════════════════
function renderDailyTable(){
  var view=getMonthView(activeMonthKey()); if(!view||!view.daily||!view.daily.length){
    document.getElementById('dailyTbody').innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text-dim);padding:24px">Нет дневных данных за выбранный месяц</td></tr>';
    return;
  }
  var planTotal=(view.depts&&view.depts['TOTAL'])?view.depts['TOTAL'].plan:0;
  var forecast=(view.depts&&view.depts['TOTAL'])?view.depts['TOTAL'].forecast:0;
  var today=todayStr();
  var rows=view.daily;
  var cumFact=0;
  var html='';
  rows.forEach(function(r){
    var isFuture=(r.fact===0||r.fact===undefined||r.fact===null)&&r.date>today;
    var isToday=(r.date===today);
    var cls=isToday?'today-row':isFuture?'future-row':'';
    var dayPct=r.plan>0?Math.round(r.fact/r.plan*100):0;
    if(!isFuture)cumFact+=r.fact||0;
    var cumPct=planTotal>0?Math.round(cumFact/planTotal*100):0;
    var factDisp=isFuture?'<span style="color:var(--text-dim)">—</span>':fmt(r.fact);
    var pctDisp=isFuture?'':('<span class="'+(dayPct>=100?'pos':dayPct>=80?'':'neg')+'">'+dayPct+'%</span>');
    var cumDisp=isFuture?'':('<span class="'+(cumPct>=100?'pos':cumPct>=80?'':'neg')+'">'+cumPct+'%</span>');
    var fcastDisp=''; // only show for today row
    if(isToday) fcastDisp='<span class="tag-forecast">'+fmtK(forecast)+'</span>';
    html+='<tr class="'+cls+'">';
    html+='<td><b>'+r.date.slice(0,5)+'</b></td>';
    html+='<td style="color:var(--text-dim)">'+dayOfWeek(r.date)+'</td>';
    html+='<td class="tag-plan">'+fmtK(r.plan)+'</td>';
    html+='<td class="tag-fact">'+factDisp+'</td>';
    html+='<td>'+pctDisp+'</td>';
    html+='<td>'+(isFuture?'':fmt(r.guests))+'</td>';
    html+='<td>'+(isFuture||!r.avgCheck?'':fmt(r.avgCheck))+'</td>';
    html+='<td>'+fcastDisp+'</td>';
    html+='<td>'+cumDisp+'</td>';
    html+='</tr>';
  });
  document.getElementById('dailyTbody').innerHTML=html;
}

// ═══════════════════════════════════════════════════════
//  HISTORY TABLE
// ═══════════════════════════════════════════════════════
var HIST_DEPTS=['THERMAL','HOTEL','KAFE','ANIM','SPA','PROCH'];
var HIST_LABELS={'THERMAL':'Thermal','HOTEL':'Гостиница','KAFE':'Кафе','ANIM':'Анимация','SPA':'SPA','PROCH':'Прочее'};

function renderHistory(){
  var hist=SALES_HISTORY; if(!hist||!hist.length)return;
  var yearSel=document.getElementById('histYear').value;
  var metric=document.getElementById('histMetric').value;
  var rows=hist;
  if(yearSel!=='all') rows=rows.filter(function(r){return String(r.year)===yearSel;});
  // Sort ascending
  rows=rows.slice().sort(function(a,b){return a.year!==b.year?a.year-b.year:a.month-b.month;});

  // Build header
  var hdr='<tr><th>Месяц</th>';
  hdr+='<th class="tag-plan">ИТОГО план</th><th class="tag-fact">ИТОГО факт</th><th>%</th><th>Гости</th>';
  HIST_DEPTS.forEach(function(d){ hdr+='<th class="t">'+HIST_LABELS[d]+'</th>'; });
  hdr+='</tr>';
  document.getElementById('histHead').innerHTML=hdr;

  // Build rows
  var html=''; var totPlan=0,totFact=0,totGuests=0;
  var totDepts={};HIST_DEPTS.forEach(function(d){totDepts[d]=0;});
  rows.forEach(function(r){
    var p=r.plan||0,f=r.fact||0,g=r.guests||0;
    totPlan+=p;totFact+=f;totGuests+=g;
    var pc=pct(f,p);
    var val=metric==='fact'?fmtK(f):metric==='pct'?(pc+'%'):fmt(g);
    html+='<tr>';
    html+='<td><b>'+RU_MONTHS[r.month-1]+'</b> '+r.year+'</td>';
    if(metric==='fact'){
      html+='<td class="tag-plan">'+fmtK(p)+'</td>';
      html+='<td class="tag-fact">'+fmtK(f)+'</td>';
      html+='<td class="'+(pc>=100?'pos':pc>=80?'':'neg')+'">'+pc+'%</td>';
      html+='<td>'+fmt(g)+'</td>';
    }else if(metric==='pct'){
      html+='<td class="tag-plan">'+fmtK(p)+'</td>';
      html+='<td class="tag-fact">'+fmtK(f)+'</td>';
      html+='<td class="'+(pc>=100?'pos':pc>=80?'':'neg')+'"><b>'+pc+'%</b></td>';
      html+='<td>'+fmt(g)+'</td>';
    }else{
      html+='<td class="tag-plan">'+fmtK(p)+'</td>';
      html+='<td class="tag-fact">'+fmtK(f)+'</td>';
      html+='<td class="'+(pc>=100?'pos':pc>=80?'':'neg')+'">'+pc+'%</td>';
      html+='<td class="tag-fact"><b>'+fmt(g)+'</b></td>';
    }
    HIST_DEPTS.forEach(function(d){
      var dv=(r.depts&&r.depts[d])?r.depts[d]:0;
      totDepts[d]+=(metric==='guests'?(r.deptGuests&&r.deptGuests[d])||0:dv);
      var dispVal=metric==='guests'?fmt((r.deptGuests&&r.deptGuests[d])||0):metric==='pct'?'':fmtK(dv);
      html+='<td class="t">'+dispVal+'</td>';
    });
    html+='</tr>';
  });
  // Total row
  var totPc=pct(totFact,totPlan);
  html+='<tr class="total-row"><td>ИТОГО</td>';
  html+='<td class="tag-plan">'+fmtK(totPlan)+'</td>';
  html+='<td class="tag-fact">'+fmtK(totFact)+'</td>';
  html+='<td class="'+(totPc>=100?'pos':totPc>=80?'':'neg')+'">'+totPc+'%</td>';
  html+='<td>'+fmt(totGuests)+'</td>';
  HIST_DEPTS.forEach(function(d){
    html+='<td class="t">'+fmtK(totDepts[d])+'</td>';
  });
  html+='</tr>';
  document.getElementById('histTbody').innerHTML=html;
}

function populateYearFilter(){
  var hist=SALES_HISTORY; if(!hist||!hist.length)return;
  var years=[]; hist.forEach(function(r){if(years.indexOf(r.year)<0)years.push(r.year);});
  years.sort(function(a,b){return b-a;});
  var sel=document.getElementById('histYear');
  years.forEach(function(y){
    var o=document.createElement('option'); o.value=y; o.textContent=y;
    sel.appendChild(o);
  });
}

// ═══════════════════════════════════════════════════════
//  MONTH SWITCHER (топбар) + COMPARE PANEL
// ═══════════════════════════════════════════════════════
function getAllMonths(){
  // Объединение ключей из SALES_HISTORY + SALES_DAILY_HISTORY + currentMonthKey
  var set={};
  if(SALES_HISTORY) SALES_HISTORY.forEach(function(r){set[r.year+'-'+String(r.month).padStart(2,'0')]=true;});
  if(SALES_DAILY_HISTORY) Object.keys(SALES_DAILY_HISTORY).forEach(function(k){set[k]=true;});
  var cur=currentMonthKey(); if(cur)set[cur]=true;
  return Object.keys(set).sort(); // YYYY-MM, ascending
}
function monthLabel(ym){
  var p=ym.split('-'); var m=+p[1]; var y=+p[0];
  return RU_MONTHS[m-1]+' '+y;
}

function defaultMonthKey(){
  // Предпочитаем КАЛЕНДАРНЫЙ текущий месяц, если по нему есть какие-либо данные.
  // Иначе — месяц из SALES_SUMMARY (последний загруженный лист).
  var now = new Date();
  var todayKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var inHistory = (SALES_HISTORY||[]).some(function(r){return r.year===now.getFullYear() && r.month===(now.getMonth()+1);});
  var inDaily   = !!(SALES_DAILY_HISTORY && SALES_DAILY_HISTORY[todayKey]);
  if (inHistory || inDaily) return todayKey;
  return currentMonthKey();
}

function populateMonthSelectors(){
  var months = getAllMonths();
  // Reverse — последние (свежие) сверху
  var rev = months.slice().reverse();
  var cur = defaultMonthKey();

  var mainSel = document.getElementById('monthSelect');
  mainSel.innerHTML = '';
  rev.forEach(function(ym){
    var o=document.createElement('option'); o.value=ym; o.textContent=monthLabel(ym);
    mainSel.appendChild(o);
  });
  // По умолчанию — текущий календарный месяц если по нему есть данные, иначе самый свежий
  ACTIVE_MONTH = (cur && months.indexOf(cur)>=0) ? cur : (rev[0]||null);
  mainSel.value = ACTIVE_MONTH;

  // Селекторы сравнения
  var selA = document.getElementById('cmpMonthA');
  var selB = document.getElementById('cmpMonthB');
  selA.innerHTML=''; selB.innerHTML='';
  rev.forEach(function(ym){
    var oa=document.createElement('option'); oa.value=ym; oa.textContent=monthLabel(ym);
    var ob=document.createElement('option'); ob.value=ym; ob.textContent=monthLabel(ym);
    selA.appendChild(oa); selB.appendChild(ob);
  });
  // Дефолт: Б = текущий/последний, А = тот же месяц прошлого года (если есть)
  selB.value = ACTIVE_MONTH;
  selA.value = pickPrevYearOrPrevMonth(ACTIVE_MONTH, months) || (rev[1]||rev[0]);
  selA.onchange = renderCompare;
  selB.onchange = renderCompare;
}

function pickPrevYearOrPrevMonth(ym, list){
  if(!ym) return null;
  var p=ym.split('-'); var y=+p[0]-1, m=+p[1];
  var prev = y+'-'+String(m).padStart(2,'0');
  if(list.indexOf(prev)>=0) return prev;
  // fallback — предыдущий месяц
  var dt=new Date(+p[0], +p[1]-2, 1);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
}

    box.appendChild(lab);
  });

function setYearOverYear(){
  // Б = текущий/последний, А = тот же месяц прошлого года
  var months=getAllMonths();
  var sb=document.getElementById('cmpMonthB');
  var ymB = sb.value;
  var prev = pickPrevYearOrPrevMonth(ymB, months);
  if(prev){
    document.getElementById('cmpMonthA').value = prev;
    renderCompare();
  }
}

function renderCompare(){
  var ymA=document.getElementById('cmpMonthA').value;
  var ymB=document.getElementById('cmpMonthB').value;
  if(!ymA||!ymB) return;
  var viewA=getMonthView(ymA), viewB=getMonthView(ymB);
  var selected = Array.from(document.querySelectorAll('#cmpDeptCb input:checked')).map(function(i){return i.value;});
  if(!selected.length){ selected = DEPT_ORDER.slice(); }

  document.getElementById('cmpTitle').textContent = '📊 Сравнение: '+monthLabel(ymA)+' vs '+monthLabel(ymB);

  // Таблица: Подразделение | План А | Факт А | План Б | Факт Б | Δ факт ₽ | Δ факт % | Гости А | Гости Б | Δ гостей
  var hdr='<thead><tr>'+
    '<th>Подразделение</th>'+
    '<th class="tag-plan">План А</th><th class="tag-fact">Факт А</th><th>%</th>'+
    '<th class="tag-plan">План Б</th><th class="tag-fact">Факт Б</th><th>%</th>'+
    '<th>Δ факт ₽</th><th>Δ факт %</th>'+
    '<th>Гости А</th><th>Гости Б</th><th>Δ гостей</th>'+
    '</tr></thead>';
  var body='<tbody>';
  selected.forEach(function(k){
    var a = (viewA.depts&&viewA.depts[k]) || {plan:0,fact:0,guests:0};
    var b = (viewB.depts&&viewB.depts[k]) || {plan:0,fact:0,guests:0};
    // Δ = Б − А (на сколько Б вырос/упал относительно базы А)
    var dF = (b.fact||0)-(a.fact||0);
    var dFp = (a.fact>0) ? Math.round(((b.fact||0)/a.fact-1)*100) : 0;
    var dG = (b.guests||0)-(a.guests||0);
    var pa=pct(a.fact,a.plan), pb=pct(b.fact,b.plan);
    var cls=(k==='TOTAL')?' class="total-row"':'';
    body+='<tr'+cls+'>';
    body+='<td>'+DEPT_EMOJI[k]+' '+DEPT_LABEL[k]+'</td>';
    body+='<td class="tag-plan">'+fmtK(a.plan)+'</td>';
    body+='<td class="tag-fact">'+fmtK(a.fact)+'</td>';
    body+='<td class="'+(pa>=100?'pos':pa>=80?'':'neg')+'">'+pa+'%</td>';
    body+='<td class="tag-plan">'+fmtK(b.plan)+'</td>';
    body+='<td class="tag-fact">'+fmtK(b.fact)+'</td>';
    body+='<td class="'+(pb>=100?'pos':pb>=80?'':'neg')+'">'+pb+'%</td>';
    body+='<td class="'+(dF>0?'delta-pos':dF<0?'delta-neg':'delta-zero')+'">'+(dF>0?'+':'')+fmtK(dF)+'</td>';
    body+='<td class="'+(dFp>0?'delta-pos':dFp<0?'delta-neg':'delta-zero')+'">'+(dFp>0?'+':'')+dFp+'%</td>';
    body+='<td>'+(a.guests?fmt(a.guests):'—')+'</td>';
    body+='<td>'+(b.guests?fmt(b.guests):'—')+'</td>';
    body+='<td class="'+(dG>0?'delta-pos':dG<0?'delta-neg':'delta-zero')+'">'+(a.guests||b.guests?(dG>0?'+':'')+fmt(dG):'—')+'</td>';
    body+='</tr>';
  });
  body+='</tbody>';

  document.getElementById('cmpTable').innerHTML = hdr+body;
  document.getElementById('cmpResult').classList.add('show');
}
